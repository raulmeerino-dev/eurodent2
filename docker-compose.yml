services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-eurodent2_copia}_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eurodent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eurodent_dev_pass}
      POSTGRES_DB: eurodent2_copia
    ports:
      - "127.0.0.1:${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data_copy:/var/lib/postgresql/data
      - ./backend/scripts/init_extensions.sql:/docker-entrypoint-initdb.d/init_extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eurodent -d eurodent2_copia"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-eurodent2_copia}_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://eurodent:${DB_PASSWORD:-eurodent_dev_pass}@postgres:5432/eurodent2_copia
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:-dev-encryption-key-change-in-prod}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-in-prod}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 240
      VERIFACTU_MODE: ${VERIFACTU_MODE:-no_verifactu}
      SIF_CODIGO: ${SIF_CODIGO:-EURODENT2-COPY}
      SIF_VERSION: ${SIF_VERSION:-0.2.0}
      SQL_ECHO: ${SQL_ECHO:-false}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-8010}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5183}
      ALLOWED_HOSTS: localhost,127.0.0.1,::1,test,backend
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8010}:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-eurodent2_copia}_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5183}:5183"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data_copy:
